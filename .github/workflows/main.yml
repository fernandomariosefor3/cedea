name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Restore dev entry for Vite
        run: |
          sed -i 's|<script type="module" crossorigin src="/assets/[^"]*\.js"></script>||g' index.html
          sed -i '/<link rel="stylesheet" crossorigin href="\/assets\/[^"]*\.css">/d' index.html
          grep -q 'src/main.tsx' index.html || sed -i 's|</head>|  <script type="module" src="/src/main.tsx"></script>\n  </head>|' index.html

      - name: Build
        run: npm run build

      - name: Update bundle in root
        run: |
          rm -rf assets
          cp -r out/assets assets
          cp out/index.html index.html
          cp out/index.html 404.html

      - name: Commit and push new bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets/
          git commit -m "chore: update bundle [skip ci]" || echo "Nothing to commit"
          git push
